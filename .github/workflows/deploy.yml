name: Deploy to EC2

# Triggered automatically after the CI workflow succeeds on main.
# Can also be triggered manually via the GitHub Actions UI.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:   # allow one-click manual deploy

jobs:
  deploy:
    name: SSH deploy → EC2
    runs-on: ubuntu-latest

    # Only deploy when CI actually passed (skip on failure/cancel)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          port:        22
          script: |
            set -e

            # ── Pull latest code ───────────────────────────────────────────
            cd ~/job-tracker
            git pull origin main

            # ── Write .env from GitHub secrets ────────────────────────────
            # This overwrites the file on every deploy so secrets stay in sync.
            cat > .env <<'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            SQS_QUEUE_URL=${{ secrets.SQS_QUEUE_URL }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ENVEOF

            # ── Run database migrations ────────────────────────────────────
            docker compose run --rm api alembic upgrade head

            # ── Rebuild and restart services ───────────────────────────────
            # --build  → rebuild images when source changes
            # --no-deps → only restart changed services (compose handles ordering)
            docker compose up -d --build

            echo "✅ Deployment complete."
